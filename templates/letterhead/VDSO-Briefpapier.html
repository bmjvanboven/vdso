  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"96bc4bb7-b4fa-4b82-b292-be74f7a8638e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ------------------------------------------------------------\n     CORE PALETTE — Navy → Platinum\n     Premium automotive: deep navy, true black, cool greys, ivory.\n     Adjacent: BMW Individual, Porsche Night Blue, Mercedes Obsidian.\n     ------------------------------------------------------------ */\n  --vdso-black:     #050608;   /* true near-black, deepest */\n  --vdso-navy:      #0A1628;   /* signature navy, primary brand */\n  --vdso-navy-deep: #06101E;   /* darker navy, hero backgrounds */\n  --vdso-midnight:  #0F1B30;   /* raised surface */\n  --vdso-ink:       #16243C;   /* card / panel */\n  --vdso-slate:     #1F2D47;   /* divider tier */\n  --vdso-steel:     #2A3854;   /* hairline stroke (dark) */\n  --vdso-iron:      #4A5468;   /* muted text / disabled */\n  --vdso-chrome:    #7E8699;   /* mid-gray, secondary text */\n  --vdso-silver:    #BCC2CE;   /* cool light gray */\n  --vdso-platinum:  #E4E6EC;   /* near-white, body text on dark */\n  --vdso-ivory:     #F4F4F1;   /* warm off-white, premium light surface */\n  --vdso-paper:     #FFFFFF;\n\n  /* Legacy alias — some components reference --vdso-obsidian */\n  --vdso-obsidian: var(--vdso-black);\n  --vdso-carbon:   var(--vdso-navy);\n  --vdso-graphite: var(--vdso-midnight);\n  --vdso-onyx:     var(--vdso-ink);\n\n  /* ------------------------------------------------------------\n     SIGNATURE ACCENT — \"Signal Blue\"\n     Electric premium blue.  Reserved for primary CTAs, the\n     active state of the O in the logo, key data emphasis, focus\n     rings, status \"available\".  NEVER two accents in one frame.\n     ------------------------------------------------------------ */\n  --vdso-blue:        #2E6BFF;   /* signature electric blue */\n  --vdso-blue-bright: #5B8DFF;   /* hover / highlighted */\n  --vdso-blue-deep:   #1E4FCC;   /* pressed / depth */\n  --vdso-blue-glow:   rgba(46, 107, 255, 0.35);\n\n  /* Legacy alias */\n  --vdso-voltage:        var(--vdso-blue);\n  --vdso-voltage-bright: var(--vdso-blue-bright);\n  --vdso-voltage-deep:   var(--vdso-blue-deep);\n  --vdso-voltage-glow:   var(--vdso-blue-glow);\n\n  /* ------------------------------------------------------------\n     SEMANTIC — desaturated, technical, not playful\n     ------------------------------------------------------------ */\n  --vdso-success: #2EC27E;\n  --vdso-warning: #F0A93B;\n  --vdso-danger:  #E5484D;\n  --vdso-info:    var(--vdso-blue);\n\n  /* ------------------------------------------------------------\n     FOREGROUND / BACKGROUND — DARK theme (default)\n     ------------------------------------------------------------ */\n  --bg-0: var(--vdso-black);\n  --bg-1: var(--vdso-navy);\n  --bg-2: var(--vdso-midnight);\n  --bg-3: var(--vdso-ink);\n  --bg-elevated: #1B2A44;\n\n  --fg-1: var(--vdso-platinum);     /* primary text */\n  --fg-2: var(--vdso-silver);       /* secondary text */\n  --fg-3: var(--vdso-chrome);       /* tertiary / labels */\n  --fg-4: var(--vdso-iron);         /* disabled / hint */\n\n  --stroke-1: rgba(190, 210, 255, 0.08);\n  --stroke-2: rgba(190, 210, 255, 0.14);\n  --stroke-3: rgba(190, 210, 255, 0.22);\n  --stroke-hairline: rgba(190, 210, 255, 0.06);\n\n  --accent: var(--vdso-blue);\n  --accent-fg: #FFFFFF;   /* text on Signal Blue */\n\n  /* ------------------------------------------------------------\n     GRADIENTS — used SPARINGLY for chrome / depth, not flair.\n     Never colorful.  Only steel-on-steel, or accent glow.\n     ------------------------------------------------------------ */\n  --grad-chrome:\n    linear-gradient(180deg, #C0C5CF 0%, #74798A 35%, #2A3854 65%, #0A1628 100%) /* @kind other */;\n  --grad-brushed:\n    linear-gradient(180deg, #2A3854 0%, #16243C 50%, #06101E 100%) /* @kind other */;\n  --grad-fade-down:\n    linear-gradient(180deg, transparent 0%, var(--vdso-black) 100%) /* @kind other */;\n  --grad-vignette:\n    radial-gradient(ellipse 80% 60% at 50% 40%, transparent 0%, rgba(0,0,0,0.7) 100%) /* @kind other */;\n  --grad-blue-glow:\n    radial-gradient(circle, var(--vdso-blue-glow) 0%, transparent 70%) /* @kind other */;\n  --grad-voltage-glow: var(--grad-blue-glow); /* @kind other */\n  --grad-navy-hero:\n    linear-gradient(135deg, #0A1628 0%, #06101E 60%, #050608 100%) /* @kind other */;\n\n  /* ------------------------------------------------------------\n     SHADOWS — restrained, cool-toned, technical\n     ------------------------------------------------------------ */\n  --shadow-xs:  0 1px 2px rgba(0, 0, 0, 0.4);\n  --shadow-sm:  0 2px 6px rgba(0, 0, 0, 0.45);\n  --shadow-md:  0 8px 24px rgba(0, 0, 0, 0.5);\n  --shadow-lg:  0 24px 60px rgba(0, 0, 0, 0.6);\n  --shadow-xl:  0 40px 100px rgba(0, 0, 0, 0.7);\n  --shadow-inset-top:    inset 0 1px 0 rgba(255, 255, 255, 0.08);\n  --shadow-inset-bottom: inset 0 -1px 0 rgba(0, 0, 0, 0.4);\n  --shadow-blue-glow: 0 0 24px var(--vdso-blue-glow), 0 0 1px var(--vdso-blue);\n  --shadow-voltage-glow: var(--shadow-blue-glow);\n\n  /* ------------------------------------------------------------\n     RADII — geometric, never overly soft.  Mirrors the logo's\n     slightly-rounded-rect language (the O is an oval rect).\n     ------------------------------------------------------------ */\n  --r-0:  0px;\n  --r-xs: 2px;\n  --r-sm: 4px;\n  --r-md: 8px;\n  --r-lg: 12px;\n  --r-xl: 18px;\n  --r-2xl: 24px;\n  --r-pill: 999px;\n\n  /* ------------------------------------------------------------\n     SPACING — 4px base grid.  Use the scale, not arbitrary px.\n     ------------------------------------------------------------ */\n  --s-0:  0px;\n  --s-1:  4px;\n  --s-2:  8px;\n  --s-3:  12px;\n  --s-4:  16px;\n  --s-5:  20px;\n  --s-6:  24px;\n  --s-8:  32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n  --s-20: 80px;\n  --s-24: 96px;\n  --s-32: 128px;\n\n  /* ------------------------------------------------------------\n     TYPOGRAPHY — font stacks\n     Display: Saira SemiCondensed (geometric, extended, automotive).\n     Body:    Geist (neutral grotesk, premium).\n     Mono:    Geist Mono (telemetry, data, code).\n     ------------------------------------------------------------ */\n  --font-display: 'Saira', 'Saira SemiCondensed',\n                  'Eurostile', 'Bahnschrift Condensed',\n                  ui-sans-serif, system-ui, sans-serif;\n  --font-body:    'Geist', 'Inter', 'SF Pro Text',\n                  ui-sans-serif, system-ui, sans-serif;\n  --font-mono:    'Geist Mono', 'JetBrains Mono',\n                  ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* Type scale — generous, confident, never cramped */\n  --t-display-2xl: clamp(72px, 9vw, 144px) /* @kind font */; /* hero, single-word statements */\n  --t-display-xl:  clamp(56px, 6.5vw, 104px); /* @kind font */\n  --t-display-lg:  clamp(40px, 4.5vw, 72px); /* @kind font */\n  --t-display-md:  clamp(32px, 3.5vw, 56px); /* @kind font */\n  --t-h1: 44px;\n  --t-h2: 32px;\n  --t-h3: 24px;\n  --t-h4: 20px;\n  --t-h5: 17px;\n  --t-body-lg: 18px;\n  --t-body:    16px;\n  --t-body-sm: 14px;\n  --t-caption: 12px;\n  --t-micro:   11px;   /* eyebrow / legal */\n\n  /* Tracking — Saira display gets WIDE tracking; Geist body gets tight */\n  --tr-display-wide:  0.16em; /* @kind font */\n  --tr-display:       0.04em; /* @kind font */\n  --tr-body:         -0.01em; /* @kind font */\n  --tr-tight:        -0.02em; /* @kind font */\n  --tr-mono:          0.02em; /* @kind font */\n\n  --lh-display: 0.95; /* @kind font */\n  --lh-tight:   1.1; /* @kind font */\n  --lh-snug:    1.25; /* @kind font */\n  --lh-body:    1.5; /* @kind font */\n  --lh-loose:   1.7; /* @kind font */\n\n  /* ------------------------------------------------------------\n     MOTION — engineered easing.  Never bouncy, never elastic.\n     Mechanical, weighted, with a slight tail (like a door close).\n     ------------------------------------------------------------ */\n  --ease-precision: cubic-bezier(0.2, 0.8, 0.2, 1) /* @kind other */; /* default */\n  --ease-mechanical: cubic-bezier(0.7, 0, 0.3, 1) /* @kind other */; /* heavy / mass */\n  --ease-instant: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n\n  --dur-instant: 100ms; /* @kind other */\n  --dur-fast:    180ms; /* @kind other */\n  --dur-base:    260ms; /* @kind other */\n  --dur-slow:    440ms; /* @kind other */\n  --dur-ambient: 800ms; /* @kind other */\n\n  /* ------------------------------------------------------------\n     LAYOUT\n     ------------------------------------------------------------ */\n  --container-max: 1440px; /* @kind other */\n  --gutter: clamp(20px, 4vw, 64px); /* @kind spacing */\n  --safe-top: max(16px, env(safe-area-inset-top)); /* @kind spacing */\n}\n\n/* ============================================================\n   LIGHT THEME — invert surfaces, keep the accent constant.\n   Used in showroom marketing pages and printed material.\n   ============================================================ */\n[data-theme=\"light\"], .theme-light {\n  --bg-0: var(--vdso-ivory);\n  --bg-1: var(--vdso-paper);\n  --bg-2: #FAFAF8;\n  --bg-3: #F2F2F0;\n  --bg-elevated: #FFFFFF;\n\n  --fg-1: var(--vdso-navy);\n  --fg-2: #1F2D47;\n  --fg-3: var(--vdso-iron);\n  --fg-4: var(--vdso-chrome);\n\n  --stroke-1: rgba(10, 22, 40, 0.10);\n  --stroke-2: rgba(10, 22, 40, 0.16);\n  --stroke-3: rgba(10, 22, 40, 0.24);\n  --stroke-hairline: rgba(10, 22, 40, 0.06);\n\n  --shadow-xs: 0 1px 2px rgba(10, 22, 40, 0.06);\n  --shadow-sm: 0 2px 8px rgba(10, 22, 40, 0.08);\n  --shadow-md: 0 8px 24px rgba(10, 22, 40, 0.10);\n  --shadow-lg: 0 24px 60px rgba(10, 22, 40, 0.14);\n}\n\n/* ============================================================\n   SEMANTIC ROLES — use these in app code, not raw tokens.\n   ============================================================ */\n.vdso-display-2xl {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--t-display-2xl);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tr-display);\n  text-transform: uppercase;\n  color: var(--fg-1);\n}\n.vdso-display-xl {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--t-display-xl);\n  line-height: var(--lh-display);\n  letter-spacing: var(--tr-display);\n  text-transform: uppercase;\n  color: var(--fg-1);\n}\n.vdso-display-lg {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--t-display-lg);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tr-display);\n  text-transform: uppercase;\n  color: var(--fg-1);\n}\n.vdso-display-md {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--t-display-md);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tr-display);\n  color: var(--fg-1);\n}\n\n.vdso-h1 { font: 500 var(--t-h1)/var(--lh-tight) var(--font-body); letter-spacing: var(--tr-tight); color: var(--fg-1); }\n.vdso-h2 { font: 500 var(--t-h2)/var(--lh-tight) var(--font-body); letter-spacing: var(--tr-tight); color: var(--fg-1); }\n.vdso-h3 { font: 500 var(--t-h3)/var(--lh-snug) var(--font-body); letter-spacing: var(--tr-body); color: var(--fg-1); }\n.vdso-h4 { font: 500 var(--t-h4)/var(--lh-snug) var(--font-body); letter-spacing: var(--tr-body); color: var(--fg-1); }\n.vdso-h5 { font: 600 var(--t-h5)/var(--lh-snug) var(--font-body); letter-spacing: var(--tr-body); color: var(--fg-1); }\n\n.vdso-body-lg { font: 400 var(--t-body-lg)/var(--lh-body) var(--font-body); letter-spacing: var(--tr-body); color: var(--fg-2); }\n.vdso-body    { font: 400 var(--t-body)/var(--lh-body) var(--font-body); letter-spacing: var(--tr-body); color: var(--fg-2); }\n.vdso-body-sm { font: 400 var(--t-body-sm)/var(--lh-body) var(--font-body); letter-spacing: 0; color: var(--fg-2); }\n.vdso-caption { font: 500 var(--t-caption)/var(--lh-snug) var(--font-body); letter-spacing: 0.02em; color: var(--fg-3); }\n\n/* Eyebrow / label — the signature treatment.  ALL CAPS, very wide track.\n   Used over every section heading, on every metric, on every model name. */\n.vdso-eyebrow {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--t-micro);\n  letter-spacing: var(--tr-display-wide);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n\n/* Mono — telemetry, technical readouts, the \"instruments\" voice */\n.vdso-mono {\n  font-family: var(--font-mono);\n  font-feature-settings: 'tnum' 1, 'ss01' 1;\n  letter-spacing: var(--tr-mono);\n}\n.vdso-readout {\n  font-family: var(--font-mono);\n  font-weight: 500;\n  font-feature-settings: 'tnum' 1;\n  letter-spacing: var(--tr-mono);\n  color: var(--fg-1);\n}\n\n/* Numerals — big metric callouts (range, 0-60, kWh).  Display font,\n   tabular figures for alignment. */\n.vdso-numeral {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-feature-settings: 'tnum' 1;\n  font-variant-numeric: tabular-nums;\n  letter-spacing: -0.02em;\n}\n\n/* ============================================================\n   GLOBAL — base reset hooks\n   ============================================================ */\nhtml { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\nbody { font-family: var(--font-body); color: var(--fg-1); background: var(--bg-0); }\n\n::selection { background: var(--vdso-voltage); color: var(--vdso-obsidian); }\n<\u002Fstyle>\n\n<style>\n@page{size:A4;margin:0}\n[contenteditable]:hover{outline:1px dashed var(--vdso-blue);outline-offset:2px}\n[contenteditable]:focus{outline:1px solid var(--vdso-blue);outline-offset:2px}\n@media print{.vdso-lh-toolbar{display:none!important}html,body{background:#fff!important}.vdso-lh-wrap{padding:0!important}.vdso-lh-page{box-shadow:none!important;margin:0!important}[contenteditable]:hover,[contenteditable]:focus{outline:none!important}}\n<\u002Fstyle><\u002Fhead>\n<body style=\"margin:0;min-height:100vh;background:#DADFE6;display:flex;flex-direction:column;align-items:center;font-family:var(--font-body)\" class=\"vdso-lh-wrap\">\n<div class=\"vdso-lh-toolbar\" style=\"width:100%;background:var(--vdso-navy);padding:16px 24px;display:flex;gap:12px;justify-content:center;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-md)\">\n<button onclick=\"window.print()\" style=\"font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:var(--vdso-blue);color:#fff;border:none;padding:12px 22px;border-radius:var(--r-md);cursor:pointer\">Opslaan als PDF<\u002Fbutton>\n<button onclick=\"downloadWord()\" style=\"font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:transparent;color:var(--vdso-platinum);border:1px solid var(--vdso-steel);padding:12px 22px;border-radius:var(--r-md);cursor:pointer\">Opslaan als Word<\u002Fbutton>\n<\u002Fdiv>\n<div class=\"vdso-lh-page\" style=\"width:794px;min-height:1123px;background:var(--vdso-paper);box-shadow:var(--shadow-lg);margin:40px 0 60px;padding:64px 64px 0;position:relative;box-sizing:border-box;display:flex;flex-direction:column\">\n<div style=\"display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(10,22,40,0.12);padding-bottom:28px\">\n<img src=\"125bdd94-a16d-416c-b1e7-b540f760acd1\" alt=\"VDSO\" style=\"height:40px;width:auto;display:block\">\n<div style=\"text-align:right;font-family:var(--font-mono);font-size:11px;line-height:1.6;color:var( it in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.<\u002Fp>\n<p style=\"margin:0 0 18px\">Voor vragen staan wij u graag persoonlijk te woord.<\u002Fp>\n<p style=\"margin:40px 0 0\">Met vriendelijke groet,<\u002Fp>\n<p style=\"margin:32px 0 0;font-weight:500\">Team VDSO<\u002Fp>\n<\u002Fdiv>\n<div style=\"border-top:1px solid rgba(10,22,40,0.12);padding:18px 0 22px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap;font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.02em;color:var(--vdso-chrome)\">\n<span>KVK 42015299<\u002Fspan><span>·<\u002Fspan><span>BTW NL869302140B0<\u002Fspan><span>·<\u002Fspan><span>NL36 RABO 0173 3874 89<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n<script>\nfunction downloadWord(){\nvar today=document.getElementById('fld-datum').textContent;\nvar referentie=document.getElementById('fld-referentie').textContent;\nvar onderwerp=document.getElementById('fld-onderwerp').textContent;\nvar bodyHtml=document.getElementById('fld-body').innerHTML;\nvar html='<html xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:w=\"urn:schemas-microsoft-com:office:word\" xmlns=\"http://www.w3.org/TR/REC-html40\">'\n+'<head><meta charset=\"utf-8\"><style>'\n+'body{font-family:Calibri,Arial,sans-serif;color:#0A1628;font-size:11pt;margin:2.5cm}'\n+'.hdr{display:table;width:100%;border-bottom:1px solid #ccc;padding-bottom:14pt;margin-bottom:20pt}'\n+'.hdr td{vertical-align:top}'\n+'.addr{text-align:right;font-size:9pt;color:#666;line-height:1.6}'\n+'.lbl{font-size:8pt;letter-spacing:1px;text-transform:uppercase;color:#888}'\n+'.ftr{border-top:1px solid #ccc;margin-top:40pt;padding-top:10pt;text-align:center;font-size:8pt;color:#888}'\n+'<\u002Fstyle><\u002Fhead><body>'\n+'<table class=\"hdr\"><tr><td><b style=\"font-size:16pt;letter-spacing:2px\">VDSO<\u002Fb><\u002Ftd>'\n+'<td class=\"addr\">Wiegershof 9, 5751 XJ<br>info@
