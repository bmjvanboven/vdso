<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Visitekaartje (met switcher)" description="Visitekaartje in de Glow-richting, met logo-uitsnede en print-export" -->
<helmet><style>
.card-face{width:85mm;height:55mm;position:relative;overflow:hidden;box-sizing:border-box;border-radius:1.4mm}
.print-sheet{display:none}
@media print{
  @page{margin:0}
  body>*:not(.print-sheet){display:none!important}
  .print-sheet{display:block!important}
  .print-card{position:relative;box-sizing:border-box;page-break-after:always}
  body[data-bleed="0"] .print-card{width:85mm;height:55mm;overflow:hidden}
  body[data-bleed="1"] .print-card{width:91mm;height:61mm;background:var(--vdso-navy)}
  body[data-bleed="0"] .cutmark{display:none}
  body[data-bleed="1"] .cutmark{display:block}
  .print-card .card-inner-slot{position:absolute;inset:0}
  body[data-bleed="1"] .print-card .card-inner-slot{inset:3mm}
  .cutmark{position:absolute;background:#000}
}
</style><script src="./ds-base.js"></script></helmet>
<div style="min-height:100vh;background:#DADFE6;display:flex;flex-direction:column;align-items:center;font-family:var(--font-body);padding-bottom:60px">
<div class="vdso-lh-toolbar" style="width:100%;background:var(--vdso-navy);padding:16px 24px;display:flex;gap:12px;justify-content:center;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-md)">
<button onclick="{{ onDownloadNoBleed }}" style="font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:var(--vdso-blue);color:#fff;border:none;padding:12px 22px;border-radius:var(--r-md);cursor:pointer">Download PDF zonder snijmarge</button>
<button onclick="{{ onDownloadBleed }}" style="font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:transparent;color:var(--vdso-platinum);border:1px solid var(--vdso-steel);padding:12px 22px;border-radius:var(--r-md);cursor:pointer">Download PDF met snijmarges (3mm)</button>
</div>

<div style="font-family:var(--font-display);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--vdso-iron);margin-top:40px">Voorkant</div>
<div ref="{{ frontRef }}" class="card-face" style="margin-top:14px;background:var(--vdso-navy);box-shadow:var(--shadow-lg)">
<div style="position:absolute;width:50mm;height:50mm;border-radius:50%;top:18mm;left:52mm;background:var(--grad-blue-glow);opacity:0.7;filter:blur(6mm)"></div>
<div style="position:absolute;inset:0;background:var(--grad-vignette)"></div>
<img src="../../assets/logos/vdso-logo-primary.png" alt="" style="position:absolute;height:11mm;width:auto;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.96">
</div>

<div style="font-family:var(--font-display);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--vdso-iron);margin-top:32px">Achterkant</div>
<div ref="{{ backRef }}" class="card-face" style="margin-top:14px;background:var(--vdso-black);box-shadow:var(--shadow-lg)">
<div style="position:absolute;inset:0;clip-path:polygon(0 0,42% 0,18% 100%,0% 100%);background:linear-gradient(160deg,var(--vdso-blue-bright),var(--vdso-blue) 55%,var(--vdso-blue-deep))"></div>
<div style="position:absolute;left:0mm;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:center center">
<img src="../../assets/logos/vdso-logo-mark.svg" alt="VDSO" style="height:9mm;filter:invert(1)">
</div>
<div style="position:absolute;left:40mm;right:6mm;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;gap:3.2mm">
<div style="font-family:var(--font-display);font-size:7px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--vdso-chrome);margin-bottom:2mm" contenteditable="true">Premium Automotive</div>
<div style="font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:0.02em;text-transform:uppercase;color:var(--vdso-platinum);line-height:1.05;margin-bottom:2mm" contenteditable="true">Stijn van der Schoot</div>
<div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.02em;color:var(--vdso-platinum)" contenteditable="true">vdso.nl</div>
<div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.02em;color:var(--vdso-platinum)" contenteditable="true">info@vdso.nl</div>
<div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.02em;color:var(--vdso-platinum)" contenteditable="true">+31 6 22580038</div>
<div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.02em;color:var(--vdso-chrome)" contenteditable="true">Wiegershof 9, 5751 XJ</div>
</div>
</div>

<div class="print-sheet" id="print-root"></div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.frontRef = React.createRef();
    this.backRef = React.createRef();
  }
  renderVals() {
    return {
      frontRef: this.frontRef,
      backRef: this.backRef,
      onDownloadNoBleed: () => this.printCard(false),
      onDownloadBleed: () => this.printCard(true)
    };
  }
  printCard(bleed) {
    const root = document.getElementById('print-root');
    root.innerHTML = '';
    const faces = [this.frontRef.current, this.backRef.current];
    faces.forEach((face) => {
      const wrap = document.createElement('div');
      wrap.className = 'print-card';
      const slot = document.createElement('div');
      slot.className = 'card-inner-slot';
      slot.appendChild(face.cloneNode(true));
      wrap.appendChild(slot);
      if (bleed) {
        const corners = [[0,3,2,0.3],[3,0,0.3,2],[89,3,2,0.3],[88,0,0.3,2],[0,58,2,0.3],[3,59,0.3,2],[89,58,2,0.3],[88,59,0.3,2]];
        corners.forEach(([l,t,w,h]) => {
          const m = document.createElement('div');
          m.className = 'cutmark';
          m.style.left = l + 'mm'; m.style.top = t + 'mm'; m.style.width = w + 'mm'; m.style.height = h + 'mm';
          wrap.appendChild(m);
        });
      }
      root.appendChild(wrap);
    });
    document.body.setAttribute('data-bleed', bleed ? '1' : '0');
    let styleTag = document.getElementById('dynamic-page-size');
    if (!styleTag) {
      styleTag = document.createElement('style');
      styleTag.id = 'dynamic-page-size';
      document.head.appendChild(styleTag);
    }
    styleTag.textContent = '@page{size:' + (bleed ? '91mm 61mm' : '85mm 55mm') + ';margin:0}';
    requestAnimationFrame(() => window.print());
  }
}
</script>
</body>
</html>
